# 都察院自动审查 — push 时触发
# 通过 OpenClaw Gateway API 将 diff 发送给都察院 Agent 审查
name: 都察院 Code Review

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'images/**'
      - 'LICENSE'

jobs:
  duchayuan-review:
    runs-on: ubuntu-latest
    # 跳过 merge commit 和 bot commit
    if: "!contains(github.event.head_commit.message, '[skip review]') && github.actor != 'github-actions[bot]'"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 需要上一个 commit 来算 diff

      - name: Generate diff
        id: diff
        run: |
          DIFF=$(git diff HEAD~1 HEAD -- . ':!*.md' ':!docs/*' ':!images/*' | head -c 12000)
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No code changes detected, skipping review."
          else
            # 写入文件避免 shell 转义问题
            echo "$DIFF" > /tmp/diff.txt
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get commit info
        if: steps.diff.outputs.skip != 'true'
        id: commit
        run: |
          echo "author=${{ github.event.head_commit.author.username || github.actor }}" >> "$GITHUB_OUTPUT"
          {
            echo "message<<COMMIT_MSG_EOF"
            echo "${{ github.event.head_commit.message }}"
            echo "COMMIT_MSG_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "url=${{ github.event.head_commit.url }}" >> "$GITHUB_OUTPUT"

      - name: Send to 都察院 via OpenClaw API
        if: steps.diff.outputs.skip != 'true'
        env:
          OPENCLAW_API_URL: ${{ secrets.OPENCLAW_API_URL }}     # e.g. http://your-server:18789
          OPENCLAW_API_TOKEN: ${{ secrets.OPENCLAW_API_TOKEN }} # Gateway admin token
          DUCHAYUAN_CHANNEL: ${{ secrets.DUCHAYUAN_DISCORD_CHANNEL }}  # Discord channel ID for review reports
        run: |
          DIFF_CONTENT=$(cat /tmp/diff.txt)

          REVIEW_PROMPT=$(cat <<'PROMPT_END'
          【都察院自动审查 — GitHub Push 触发】

          提交者: ${{ steps.commit.outputs.author }}
          Commit: ${{ steps.commit.outputs.sha }}
          消息: ${{ steps.commit.outputs.message }}
          链接: ${{ steps.commit.outputs.url }}

          请审查以下代码变更，检查：安全漏洞、性能问题、逻辑错误、代码规范。
          审查完毕后将结论发送到 Discord 频道。

          --- DIFF 开始 ---
          PROMPT_END
          )

          # 拼接 prompt + diff（使用文件避免 shell 转义问题）
          echo "${REVIEW_PROMPT}" > /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          cat /tmp/diff.txt >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "--- DIFF 结束 ---" >> /tmp/prompt.txt

          # 通过 OpenClaw sessions API 发送给都察院
          curl -s -X POST "${OPENCLAW_API_URL}/api/sessions/send" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OPENCLAW_API_TOKEN}" \
            -d "$(jq -n \
              --arg agentId "duchayuan" \
              --rawfile message /tmp/prompt.txt \
              --arg label "duchayuan-review-${{ github.sha }}" \
              '{agentId: $agentId, message: $message, label: $label}'
            )" || echo "⚠️ Failed to reach OpenClaw API. Make sure OPENCLAW_API_URL and OPENCLAW_API_TOKEN secrets are configured."
