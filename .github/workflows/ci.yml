# [M-10] PR / push 触发的基本 CI 检查
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          echo "=== Validating JSON files ==="
          for f in openclaw.example.json; do
            echo "  Checking $f..."
            python3 -m json.tool "$f" > /dev/null
          done
          echo "✅ All JSON files valid"

      - name: ShellCheck install scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          additional_files: 'install.sh install-lite.sh install-mac.sh doctor.sh'
          severity: warning

      - name: Check Dockerfile builds
        run: docker build --no-cache -t ai-court-test . 2>&1 | tail -5

      - name: GUI server syntax check
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --check gui/server/index.js
